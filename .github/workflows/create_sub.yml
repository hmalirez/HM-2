name: Create SUB File

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create SUB file with Kotlin
        run: |
          cat > CreateSub.kt << 'EOF'
          import java.io.File
          import java.io.RandomAccessFile
          import java.util.UUID
          
          class MMKVWriter(private val filePath: String) {
              fun writeEntry(key: String, json: String) {
                  val file = RandomAccessFile(filePath, "rw")
                  file.seek(file.length())
                  val keyBytes = key.toByteArray(Charsets.UTF_8)
                  val jsonBytes = json.toByteArray(Charsets.UTF_8)
                  file.writeInt(keyBytes.size)
                  file.write(keyBytes)
                  file.writeInt(jsonBytes.size)
                  file.write(jsonBytes)
                  file.close()
              }
          }
          
          class SubscriptionManager(private val mmkvPath: String) {
              private val writer = MMKVWriter(mmkvPath)
          
              fun addSubscription(remarks: String, url: String): String {
                  val guid = UUID.randomUUID().toString().replace("-", "")
                  val json = """
                  {"remarks":"$remarks","url":"$url","enabled":true,"addedTime":${System.currentTimeMillis()},"lastUpdated":-1,"autoUpdate":true,"filter":"","allowInsecureUrl":false,"userAgent":""}
                  """.trimIndent()
                  writer.writeEntry(guid, json)
                  return guid
              }
          }
          
          fun main() {
              val mmkvPath = "V2rayNG/app/src/main/assets/mmkv/SUB"
              File(mmkvPath).parentFile?.mkdirs()
              val manager = SubscriptionManager(mmkvPath)
              
              manager.addSubscription("My Config 1", "https://raw.githubusercontent.com/hmalirez/Page/refs/heads/main/iran1.txt")
              manager.addSubscription("My Config 2", "https://raw.githubusercontent.com/hmalirez/Page/refs/heads/main/iran2.txt")
              manager.addSubscription("My Config 3", "https://raw.githubusercontent.com/hmalirez/Page/refs/heads/main/iran3.txt")
              
              println("✅ SUB file created at: $mmkvPath")
          }
          
          main()
          EOF
          
      - name: Run Kotlin script
        run: |
          kotlin CreateSub.kt
          
      - name: Upload SUB file
        uses: actions/upload-artifact@v4
        with:
          name: SUB-file
          path: V2rayNG/app/src/main/assets/mmkv/SUB
